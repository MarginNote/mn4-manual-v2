        - id: ma1UxicEXg8YWjPQYuDScu   # 文档阅读设置
          difficulty: 1
          read_time: 3
          desc: "MarginNote 具有丰富的文档阅读设置功能，主要通过三大模块实现：一是支持对文档页面亮度、翻页模式、5"
        - id: rpmCakup76GuHCF6N4Ns5c   # 检索①：全文 OCR +搜索定位，扫描版书籍也可畅享阅读
          difficulty: 1
          read_time: 4
          desc: "能搜索！搜得准！能定位！多语种OCR识别+校正能力，让电子书阅读无忧，检索顺畅。"
        - id: 8PoZfbSRai6owkvzpttZAE   # 检索②：查看文档目录/缩略图/书签/手写标注/卡片
          difficulty: 1
          read_time: 3
          desc: "MarginNote 的书页查找功能整合了五种检索方式：目录、缩略图、书签、手写标注和卡片，可根据不同使用需求快速定位目标页面。"
        - id: n8VMVG5yoZj8WRatAPzJkm   # 对照①：双文对照窗口
          difficulty: 1
          read_time: 3
          desc: "无论是教材与视频、习题册与答案册，原文与笔记、还是同一文档不同位置，都能并排呈现，轻松切换。对照视图状态可随时保存。"
        - id: 2dQ7P1XFEV2UyqCLWyU7dU   # 对照②：文档间引证回源
          difficulty: 2
          read_time: 3
          desc: "什么是“引证”，什么是“回源”？引证简单来说是引用不同语境下的内容。可以分为两种情况。1. 在同一文档位置2. 在文档的某个位置引用其他文档的内容。回源指的则是从引用处跳转回原文的功能。"
        - id: 91LaezjY5SXvoCRie5UsJQ   # 留白②|使用场景：分层管理阅读笔记
