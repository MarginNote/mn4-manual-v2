# 用户手册目录 (toc) — 结构 + 元数据的单一来源
# section(label/title/desc) → category(icon/desc) → pages
# 每页: id = src/ 文件夹名；'#' 后为标题标注(构建以 H1 为准)；difficulty 1-3 / read_time 分钟 / desc 描述

- section: "📄 文档"
  label: "Document"
  title: "文档"
  desc: "无论你用的是 PDF 教材、扫描版讲义还是 EPUB  电子书，文档分区的功能都能帮你高效地阅读、做笔记、查找内容和管理页面。如果你之前用过其他阅读器或笔记软件，这部分会是最熟悉的起点。"
  categories:
    - category: "文档快速笔记"
      icon: "📝"
      desc: "在 PDF 上摘录、插入笔记、手写批注，快速记录阅读想法"
      pages:
        - id: 9aXhp2VEugXYNp9cnWCT7A   # 摘录：抓住全文重点
          difficulty: 1
          read_time: 4
          desc: "摘录是 MN4 文档阅读笔记的核心功能，无需绑定脑图框架，就能高效提取、管理和复用关键信息。兼具可编辑、易复用的优势，适配多种阅读场景。"
        - id: 3w7coSpmfsLecSW1hxQV24   # 新建文本框/图片/拍照
          difficulty: 1
          read_time: 3
          desc: "文本框 - 就地标注：在原文旁边写补充、重点、疑问，避免把想法散落在别处。图片 - 讲解流程：插入截图/示意图并可改大小、复制、剪切、删除，信息更清晰。拍照 - 课堂、会议、图书学习的即刻记录：把纸页…"
        - id: 9RzcqeeMfTifmGxNdmqzAi   # 新建空白笔记本
          difficulty: 1
          read_time: 3
          desc: "新建笔记本是 MarginNote 4 提供的功能，允许你在某个学习集中创建一个独立的空白笔记本，用来做课后笔记、草稿、思维导图前的手写草稿等。它与直接在 PDF 上做笔记一样，可转为卡片并纳入脑图、…"
        - id: vYi6Yu4oCudNCr2zDuNQkj   # 留白①|基础操作：字里行间自由开辟笔记空间
          difficulty: 1
          read_time: 4
          desc: "留白功能可在 PDF 任意位置插入一块空白笔记区域，用于补充解释、记录思考、放入关联资料或提出问题，而不会改变原文的排版结构。"
        - id: pYzC5dfXtbC7taLgQC3DFs   # 手写：, 在文档、脑图、卡片中自由书写
          difficulty: 2
          read_time: 9
          desc: "随处可写！支持手写图层、消失笔模式、涂抹擦除、AI 转文本，可一键复制笔刷或导入他人配置好的参数。"
        - id: 6gbzKZ4a16uYGaFNLMYASD   # 图层：文档笔记本&手写图层
          difficulty: 2
          read_time: 6
          desc: "像“透写纸”一样：在一份原始PDF上，叠加多个图层进行记录。独家分级图层设计，让学习记录合理分区。"
        - id: v2vpgXTJGFsqtRZkRUcqtG   # 翻译及保存译文
          difficulty: 2
          read_time: 6
          desc: "翻译并保存译文的四种方式：文档即时翻译、AI 翻译与 AI OCR、研究侧栏（含自定义 URL）和插件翻译。可以将译文插入为留白、复制到剪贴板或保存为卡片，用于并排对照与后续整理。"
        - id: iLGrRDRMEQepittcNY4Bun   # 手形工具弹出菜单栏及其自定义
          difficulty: 1
