        - id: djV6nMiEdSaxCacjWcptpA   # 手动&自动生成文档目录
          difficulty: 1
          read_time: 5
          desc: "为没有目录的 PDF 搭建清晰的章节层级。支持手动创建、AI  自动生成，目录可直接转化为脑图结构。虚拟目录不修改源文件，可随时重置。"

- section: "📚 学习集与脑图"
