          difficulty: 1
          read_time: 3
          desc: "隐藏文档中不需要的内容——按章节折叠或手动折叠局部区域。折去页眉页脚后可顺畅跨页摘录，隐藏答案避免提前看  到解析，随时可展开，比删除页面更灵活。"
        - id: kFM4Uh2thC5pEXp11wCuJz   # 书页重组
          difficulty: 1
          read_time: 3
          desc: "把不同文档的页面拖拽组合成虚拟文档，实现以页面为单元的拆分与重组。不复制原文件只引用页面，适合从多本教  材中抽取章节组成自己的学习资料。"
        - id: akPnCSBmGv2BXCzkTBrFTB   # 增删页面、裁剪纸张
          difficulty: 1
          read_time: 3
