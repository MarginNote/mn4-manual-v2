          desc: "Mac+iPad 通过 Sidecar 扩展显示，iPad+Windows 通过 Spacedesk/Duet Display  实现跨平台协同，充分利用多设备优势。"
        - id: sfUjjrbMwvEdtmDgXuzpL2   # 第三方应用联动①：认识笔记回源链接
          difficulty: 3
          read_time: 4
          desc: "生成卡片 URL 和界面 URL，在其他应用中点击即可跳回 MN4 对应位置。打通 MN4 与第三方应用的知识链路。"
        - id: hTKcNyLnc362NvwEvMbt2e   # 第三方应用联动②：Obsidian+MN4
          difficulty: 1
          read_time: 5
          desc: "通过 Obsidian-Bridge 插件将 MN4 笔记同步到  Obsidian，实现双向链接和知识图谱可视化，构建更完整的个人知识管理系统。"
