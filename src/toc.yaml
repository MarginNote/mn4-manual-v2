        - id: 3RP4xfuiFKc6SAF8r1BHfK   # 对照③：附属笔记本
          difficulty: 3
          read_time: 3
          desc: "在附属笔记本上书写的笔迹、批注、笔记内容，会与原 PDF 文档的对应页码、对应位置自动绑定关联。点击附属笔记本中的任意笔记/笔迹，即可一键定位、跳转回原 PDF 的原始位置，实现笔记与原文的精准溯源对照。"
    - category: "文档排版与书页编辑"
      icon: "✂️"
      desc: "折叠章节、重组页面、裁剪纸张，把 PDF 改造成最适合你的版本"
