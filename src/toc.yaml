          read_time: 4
          desc: "打破设备默认字体限制，在 Mac 和 iOS 上安装自定义字体。提供字体下载网站推荐、安装教程和常见问题解决方案  ，还能开启\"随手写\"让手写自动变印刷体。"
        - id: 7bcacoRsGX43EK3KBoodj1   # 脑图手写背景和卡片尺寸设置
          difficulty: 2
          read_time: 5
          desc: "调整卡片显示选项（只显示标题、紧凑宽度）、手写背景（点图/网格/横线）和卡片尺寸，优化脑图的视觉效果和演  示效率。"
        - id: bqdqqoArAjk9afFWktd9aF   # 脑图手写随动绑定
          difficulty: 2
          read_time: 4
          desc: "让手写批注跟着卡片走。三种绑定方式：自动绑定、焦点绑定、手动绑定，移动卡片时手写内容同步移动，不再错位。"
        - id: 6b7GJnTDfs2kkNsBWT7AhG   # 自定义卡片摘录颜色
    - category: "卡片链接与笔记库重复利用"
      icon: "🔗"
      desc: "给卡片建立关联、筛选分组、跨学习集复用，让积累的笔记活起来"
      pages:
        - id: dJvh1K4GEKaJYtZ14zbfgj   # 卡片分组看板①：从海量卡片中精准筛选
          difficulty: 2
          read_time: 3
          desc: "按来源、颜色、标签、文档、日期等多维度筛选卡片，支持两层嵌套分组和批量编辑。从海量卡片中快速找到你需要  的内容。"
        - id: aBEbDgL6oDgDT4CeXotdbS   # 卡片链接④|关键词标题链接：打造你的个人字典
          difficulty: 3
          read_time: 6
          desc: "类似 Wikipedia 的超链接——在卡片标题中设置关键词，文档中出现这些词时自动显示蓝色虚线，点击即弹出解释卡  片。适合考试复盘、论文精读、英语学习。"
        - id: pXcHjMTVqjcvvgEiNnTQm5   # 卡片分组看板②：从看板自动生成脑图，打造个人知识集锦
          difficulty: 1
          read_time: 3
          desc: "筛选出需要的卡片后拖拽到脑图，自动生成新脑图。适合创建错题本、核心概念速查、历年真题汇编等专属集锦库。"
        - id: mGz8BQh6r1ad6wv1jqDo1G   # 卡片链接①|单双向链接：跨越层级的自由关联
          difficulty: 1
          read_time: 4
          desc: "卡片除了有上下级这种“相对固定”的节点结构外，还有一种更“自由”的结构——链接。链接的优势在于不限制两张卡片的位置：卡片可以来自不同子脑图，甚至是不同学习集，并可以随时跳转查看。"
        - id: tg7V1E5VRtGvse2ndVgNXx   # 卡片链接②|卡片唯一ID、URL：跨脑图、学习集关联
          difficulty: 1
          read_time: 5
          desc: "链接功能的本质就是某张卡片 URL"
        - id: c8dY2ezo4RX67KkmL5dCZp   # 卡片链接③：手绘曲线链接
          difficulty: 1
          read_time: 2
          desc: "用手写笔画快速调整脑图结构——画线建立链接、画折线删除链接、画圆圈选中卡片。无需频繁切换模式，提升脑图编  辑效率。"
        - id: sncaMzMHTBx6abg1dZcPfB   # 卡片链接⑤|行内链接
          difficulty: 1
          read_time: 4
          desc: "在卡片评论中用 Markdown 格式链接其他卡片，支持 [[  搜索和自定义显示文本。解决在文本中精确引用特定卡片的需求。"

- section: "🔄 复习"
  label: "Review"
  title: "复习"
  desc: "整理好的知识如果不复习，很快就会遗忘。这部分介绍如何利用脑图和闪卡进行科学复习——包括主动回忆、间隔重复、回溯原文等方法，帮你把短期记忆转化为长期掌握。"
  categories:
    - category: "脑图&文档上下文场景式复习"
      icon: "💡"
      desc: "在脑图结构中遮挡回忆，或跳回原文上下文，带着语境复习"
      pages:
        - id: 5MLZk1D4vJ6wQRx1Y9t8vy   # 脑图复习①：主动回忆与自测方法
          difficulty: 2
          read_time: 4
          desc: "四种脑图复习法：遮挡回忆（测细节）、标题抽查（测主干）、节点逐级展开（测结构）、子脑图默写（测完整知识  ）。建议先定位薄弱点，再针对性强化。"
        - id: xb9ytGwYP6gPVGJ4hDvca4   # 脑图复习②：脑图上下文（回源定位）
          difficulty: 2
          read_time: 4
          desc: "复习时一键回溯原文。支持脑图↔文档四种联动模式，还可通过大纲、卡片盒、看板等多种方式定位卡片，快速查看  知识点的上下文。"
    - category: "闪卡制作与复习"
      icon: "🃏"
      desc: "制作正反面闪卡，用 FSRS 算法自动安排复习间隔，科学对抗遗忘"
      pages:
        - id: auMvW4AbuCoxDmYipisYoS   # 闪卡制作①：认识闪卡和复习卡片组
          difficulty: 1
          read_time: 6
          desc: "了解闪卡的基本概念——正面是问题，背面是答案。学会创建复习卡片组、添加卡片、查看闪卡效果，是使用间隔复习  功能的第一步。"
        - id: pKZaNAWQAm3Wp41awj1ZJb   # 闪卡制作②：添加卡片到复习卡组
          difficulty: 2
          read_time: 6
          desc: "多种高效制卡方式：手动添加、看板批量筛选、摘录时自动添加、AI OCR 和 AI  对话制卡。预设摘录属性可大幅降低制卡成本。"
        - id: 31KwWufHLt8MUbyxQahbP3   # 闪卡复习①：基于FSRS抗遗忘算法的科学复习
          difficulty: 2
          read_time: 8
          desc: "FSRS 算法根据你的记忆反馈自动计算最优复习时间。掌握全屏复习模式、四个记忆程度选项的含义、收藏和批注等  辅助功能，让复习更科学高效。"
        - id: ozYBXbvi3AkqiBShA7X7Co   # 闪卡复习②：溯源上下文
          difficulty: 2
          read_time: 5
          desc: "复习时记不起来？切换到脑图或文档视图查看卡片的上下文。两种复习方式对比：日常快速复习 vs  深度理解复习，卡片-脑图-文档三位一体联动。"
        - id: 4zZ4C4Y4jgfdszohqSE4Zm   # 闪卡复习③：导出到Anki &模板配置
          difficulty: 3
          read_time: 9
          desc: "将 MN4 闪卡导出到  Anki，支持遮挡设置、默认模板和自定义模板。提供多个社区模板下载链接，适合追求更丰富卡片样式的高级用户。"
        - id: pBH9BFrgyZgeWJVf3xLyVA   # 闪卡制作③：设置闪卡正反面
          difficulty: 1
          read_time: 7
          desc: "前置条件你需要先阅读闪卡制作第①②篇，确保你已经有卡片添加到复习卡组。在第②篇，你学会了如何添加卡片。本页将教你如何精细设置闪卡的正反面，让复习更高效开始前建议先了解卡片编辑器的相关功能（详见：）。"

- section: "🔧 通用"
  label: "General"
  title: "通用"
  desc: "数据安全、多设备同步、导出分享、跨应用联动——这些不直接关乎\"学什么\"，但关乎\"学得安心、用得顺手\"。当你需要备份数据、迁移笔记、多设备协作或与其他工具配合使用时，来这里找答案。"
  categories:
    - category: "数据安全与管理"
      icon: "🗂️"
      desc: "导入文档、管理数据库、同步备份、导出分享"
      pages:
        - id: ehTLoD9HictQhkFirV1g9k   # 导入文档及文档管理
          difficulty: 1
          read_time: 5
          desc: "文档的导入、分类和管理全流程。支持从文件、网页、文档库等多种方式导入，通过分类（标签式）或文件夹（层级  式）组织文档，还能跨学习集复用笔记和卡片。"
        - id: gaqm2hZ9YMPQSFpWQjLJ9g   # 从MarginNote 3 迁移笔记
          difficulty: 1
          read_time: 2
          desc: "从 MN3 导出学习集备份（.marginpkg），在 MN4 中导入即可完成迁移。支持替换和合并两种导入模式。"
        - id: wW5jUCGqwwDVgqFKz7dF48   # 添加USB存储文档库
          difficulty: 1
          read_time: 2
          desc: "将 U 盘或移动硬盘中的文档直接在 MN4 中打开和学习，适合需要便携访问大量资料的场景。"
        - id: wVmpipXpgJM4ZicKDvV6A7   # 笔记数据库①：新建和管理数据库
          difficulty: 1
          read_time: 5
          desc: "通过频率 ID  系统创建隔离的笔记数据库，实现不同时期、不同领域的笔记数据分离。支持多设备同步和灵活的数据管理。"
        - id: erRJu57Xk6QiAZ6u4yZRoM   # 导出文档、脑图和学习集
          difficulty: 2
          read_time: 6
          desc: "支持导出为 PDF、mmap、OmniOutliner、Word、Anki 等多种格式。脑图可导出为思维导图 PDF  或焦点分支，学习集可整体备份或导出到其他数据库。"
        - id: oVbmHKiwfNETVYEapEWctk   # 笔记数据库②：加密分享
          difficulty: 3
          read_time: 6
          desc: "通过许可证机制控制数据库访问权限，支持在线/离线激活。适合教师分享教学资料或团队协作时的数据安全管理。"
        - id: qU6nwa4s6GCBuTDsjs9oeu   # 数据同步、备份与恢复
          difficulty: 1
          read_time: 10
          desc: "iCloud 同步实现多设备数据一致，版本备份（自动）和完整备份（手动）保障数据安全。支持从版本历史恢复，避  免数据丢失。"
    - category: "演示与协同"
      icon: "🖥️"
      desc: "多窗口联动、跨设备协作、第三方应用联动"
      pages:
        - id: 8t31KYaFrm1XdjqZuPBSVr   # 演示模式及其应用
          difficulty: 1
          read_time: 2
          desc: "录屏+录音，适合制作教学视频和课程演示。配合消失笔模式，实现讲解时笔迹自动消失的效果。"
        - id: f8k3D3oR5bCw4QCQU7CBZC   # 多窗口联动①：同一设备多开 MN4窗口
          difficulty: 1
          read_time: 2
          desc: "在同一台设备上同时打开多个 MN4 窗口，对照不同文档或学习集，提升多任务处理效率。"
        - id: iz4fVfRZ5meSevCJ8yBfcj   # 多窗口联动②：跨设备、跨平台多开 MN4窗口
          difficulty: 2
